server:
  port: 8000

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never

spring:
  application:
    name: drai-backend
  datasource:
    url: jdbc:mysql://localhost:3306/drai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
      database: 6
  sql:
    init:
      mode: never
      schema-locations: classpath:db/schema.sql
  flyway:
    enabled: ${DRAI_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

drai:
  auth:
    enabled: true
    token-secret: zzy-dev-local-secret-change-me-2026-long-enough
    token-ttl-seconds: 86400
  llm:
    base-url: ${DRAI_LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${DRAI_LLM_API_KEY:}
    fast-model: ${DRAI_LLM_FAST_MODEL:qwen3.7-plus}
    smart-model: ${DRAI_LLM_SMART_MODEL:qwen3.7-max}
    timeout: ${DRAI_LLM_TIMEOUT:30s}
    max-attempts: ${DRAI_LLM_MAX_ATTEMPTS:2}
    provider-max-retries: ${DRAI_LLM_PROVIDER_MAX_RETRIES:0}
    log-requests: ${DRAI_LLM_LOG_REQUESTS:false}
    log-responses: ${DRAI_LLM_LOG_RESPONSES:false}
  embedding:
    model: ${DRAI_EMBEDDING_MODEL:text-embedding-v4}
  chroma:
    base-url: http://localhost:8001
    tenant: default_tenant
    database: default_database
    collection: drai_docs
#    token:
  rag:
    relevance-threshold: 0.2
  tavily:
    api-key: ${DRAI_TAVILY_API_KEY:${TAVILY_API_KEY:}}
  market:
    tushare:
      enabled: ${DRAI_TUSHARE_ENABLED:${DRAI_MARKET_ENABLED:false}}
      base-url: ${DRAI_TUSHARE_BASE_URL:${DRAI_MARKET_BASE_URL:https://api.tushare.pro}}
      api-key: ${DRAI_TUSHARE_API_KEY:${DRAI_MARKET_API_KEY:}}
      timeout: ${DRAI_TUSHARE_TIMEOUT:${DRAI_MARKET_TIMEOUT:10s}}
  search:
    max-attempts: 2
  redis:
    runtime-ttl: PT24H
  async:
    workflow-threads: 8
    financial-provider-threads: 6
  workflow:
    recovery-interval-ms: ${DRAI_WORKFLOW_RECOVERY_INTERVAL_MS:60000}
    recovery-stale-after: ${DRAI_WORKFLOW_RECOVERY_STALE_AFTER:PT5M}
