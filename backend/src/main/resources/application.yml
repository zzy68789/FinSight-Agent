server:
  port: 8000

spring:
  application:
    name: drai-backend
  datasource:
    url: jdbc:mysql://localhost:3306/drai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
      database: 6
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

drai:
  auth:
    enabled: true
    token-secret: zzy-dev-local-secret-change-me-2026-long-enough
    token-ttl-seconds: 86400
  llm:
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: ${OPENAI_API_KEY}
    fast-model: qwen3.7-plus
    smart-model: qwen3.7-max
    timeout: 30s
    max-attempts: 2
    provider-max-retries: 0
    log-requests: false
    log-responses: false
  embedding:
    model: text-embedding-v4
  chroma:
    base-url: http://localhost:8001
    tenant: default_tenant
    database: default_database
    collection: drai_docs
#    token:
  rag:
    relevance-threshold: 0.2
  tavily:
    api-key: ${TAVILY_API_KEY}
  market:
    tushare:
      enabled: true
      base-url: https://api.tushare.pro
      api-key: ${DRAI_TUSHARE_API_KEY}
      timeout: 10s
  search:
    max-attempts: 2
  redis:
    runtime-ttl: PT24H
  async:
    workflow-threads: 8
    financial-provider-threads: 6
